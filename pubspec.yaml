name: md_editor
description: "An offline Markdown viewer and editor Android app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_markdown: ^0.7.3+1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  file_picker: ^8.0.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
